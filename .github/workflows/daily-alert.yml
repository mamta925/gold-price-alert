name: Daily Gold Alert

on:
  schedule:
    # 08:30 IST = 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Wake SnapDeploy and run alert pipeline
        env:
          SNAPDEPLOY_APP_URL: ${{ secrets.SNAPDEPLOY_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SNAPDEPLOY_APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Missing SNAPDEPLOY_APP_URL or CRON_SECRET repository secrets"
            exit 1
          fi
          base="${SNAPDEPLOY_APP_URL%/}"

          # SnapDeploy auto-sleeps the container; the first request returns a 503
          # "waking up" page. Poll /health until the app itself answers 200.
          echo "Waking container via GET $base/health ..."
          awake=0
          for i in $(seq 1 30); do
            # -L follows SnapDeploy's http->https (308) redirect so we reach the app.
            code=$(curl -sL -o /dev/null -w "%{http_code}" --max-time 30 "$base/health" || echo 000)
            echo "  health attempt $i -> HTTP $code"
            if [ "$code" = "200" ]; then
              awake=1
              echo "Container is awake."
              break
            fi
            sleep 10
          done
          if [ "$awake" -ne 1 ]; then
            echo "Container did not wake within timeout (last HTTP $code)."
            exit 1
          fi

          echo "Triggering POST $base/run ..."
          # -L follows redirects; --post301/302/303 keep it a POST (not downgraded to GET)
          # if SNAPDEPLOY_APP_URL is http:// and the edge redirects to https://.
          code=$(curl -sL --post301 --post302 --post303 \
            -o /tmp/run_body.txt -w "%{http_code}" --max-time 180 \
            -X POST -H "X-Cron-Secret: ${CRON_SECRET}" "$base/run")
          echo "POST /run -> HTTP $code"
          echo "--- response body ---"
          cat /tmp/run_body.txt || true
          echo ""
          if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
            echo "Run endpoint returned non-2xx status $code"
            exit 1
          fi
          echo "Run succeeded."
