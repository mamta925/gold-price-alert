name: Daily Gold Alert

on:
  schedule:
    # 08:30 IST = 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Wake SnapDeploy and run alert pipeline
        env:
          SNAPDEPLOY_APP_URL: ${{ secrets.SNAPDEPLOY_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SNAPDEPLOY_APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Missing SNAPDEPLOY_APP_URL or CRON_SECRET repository secrets"
            exit 1
          fi
          base="${SNAPDEPLOY_APP_URL%/}"
          host=$(printf '%s' "$base" | sed -E 's#^https?://##; s#/.*##')
          subdomain="${host%%.*}"
          wake_url="https://snapdeploy.dev/api/public/wake/${subdomain}"

          # SnapDeploy auto-sleeps the container. A plain GET only returns the
          # "waking up" HTML page — it does NOT start the container. The wake page's
          # JS calls the platform wake API, so we must call it here to actually wake.
          echo "Requesting wake: POST $wake_url"
          curl -sS -X POST -H "Content-Type: application/json" --max-time 40 "$wake_url" || true
          echo ""

          echo "Waiting for container to become healthy ..."
          awake=0
          for i in $(seq 1 30); do
            hc=$(curl -sL -o /dev/null -w "%{http_code}" --max-time 30 "$base/health" || echo 000)
            echo "  health attempt $i -> HTTP $hc"
            if [ "$hc" = "200" ]; then
              awake=1
              echo "Container is awake."
              break
            fi
            # Re-issue the wake every 5 attempts in case the first didn't take.
            if [ $((i % 5)) -eq 0 ]; then
              curl -sS -X POST -H "Content-Type: application/json" --max-time 40 "$wake_url" >/dev/null || true
            fi
            sleep 12
          done
          if [ "$awake" -ne 1 ]; then
            echo "Container did not wake within timeout."
            exit 1
          fi

          echo "Triggering POST $base/run ..."
          run_ok=0
          for i in $(seq 1 10); do
            # -L follows http->https redirect; --post30x keeps the method a POST.
            code=$(curl -sL --post301 --post302 --post303 \
              -o /tmp/run_body.txt -w "%{http_code}" --max-time 180 \
              -X POST -H "X-Cron-Secret: ${CRON_SECRET}" "$base/run")
            if grep -qi "Waking up your container\|Container is Sleeping" /tmp/run_body.txt 2>/dev/null; then
              echo "  run attempt $i -> HTTP $code (container still waking, retrying in 15s)"
              sleep 15
              continue
            fi
            echo "  run attempt $i -> HTTP $code"
            if [ "$code" -ge 200 ] && [ "$code" -lt 300 ]; then
              run_ok=1
              break
            fi
            echo "--- response body ---"
            cat /tmp/run_body.txt || true
            echo ""
            echo "Run endpoint returned non-2xx status $code"
            exit 1
          done

          if [ "$run_ok" -ne 1 ]; then
            echo "Container did not become ready for POST /run within timeout."
            exit 1
          fi
          echo "--- response body ---"
          cat /tmp/run_body.txt || true
          echo ""
          echo "Run succeeded."
